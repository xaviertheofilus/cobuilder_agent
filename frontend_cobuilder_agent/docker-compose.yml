name: frontend_cobuilder_agent

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_PREVIEW_BASE_URL: ${VITE_PREVIEW_BASE_URL:-http://localhost:8000}
    container_name: frontend_cobuilder_agent
    ports:
      - "5173:80"
    restart: unless-stopped
